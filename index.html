<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<base target="_top">
<style>
  :root{
    --blue:#2F5597; --blue2:#4472C4; --ink:#1f2937; --mut:#6b7280;
    --line:#e5e7eb; --bg:#f4f6fb; --green:#2e9e5b; --greenbg:#e2efda;
    --red:#c0392b; --redbg:#fde9e9; --amber:#d98800; --amberbg:#fff3d6;
    --A:#4472C4; --B:#2e9e5b; --C:#d98800; --D:#9b59b6; --E:#17a2a2;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Microsoft JhengHei","Segoe UI",Arial,sans-serif;
       background:var(--bg);color:var(--ink);font-size:16px}
  header{background:linear-gradient(100deg,var(--blue),var(--blue2));color:#fff;
         padding:22px 26px;box-shadow:0 2px 8px rgba(0,0,0,.12);text-align:center}
  header h1{margin:0;font-size:30px;font-weight:800;letter-spacing:2px}
  header .sub{opacity:.85;font-size:13px;margin-top:6px}
  nav{display:flex;gap:4px;background:#fff;padding:0 18px;border-bottom:1px solid var(--line);
      position:sticky;top:0;z-index:20;overflow-x:auto;justify-content:center}
  nav button{border:0;background:none;padding:15px 18px;font-size:16px;color:var(--mut);
             cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;font-family:inherit}
  nav button.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
  main{padding:24px;max-width:1180px;margin:0 auto}
  .tab{display:none} .tab.active{display:block}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;
        box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .card .k{font-size:14px;color:var(--mut)} .card .v{font-size:32px;font-weight:800;color:var(--blue);margin-top:4px}
  .card .v small{font-size:15px;color:var(--mut);font-weight:500}
  .panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:22px}
  .panel h2{margin:0 0 16px;font-size:18px;color:var(--blue)}
  .prow{display:flex;align-items:center;gap:12px;margin:11px 0}
  .prow .name{width:160px;font-weight:600;flex-shrink:0;font-size:15px}
  .prow .meta{width:120px;font-size:13px;color:var(--mut);flex-shrink:0}
  .bar{flex:1;height:22px;background:#eef0f5;border-radius:11px;overflow:hidden;position:relative}
  .bar>span{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--blue2),var(--green));
            border-radius:11px;transition:width .5s}
  .bar em{position:absolute;right:8px;top:0;line-height:22px;font-size:12px;color:#333;font-style:normal;font-weight:700}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{border:1px solid var(--line);padding:9px 11px;text-align:center}
  th{background:#f0f3fa;color:var(--blue);font-weight:700}
  td.name{text-align:left;font-weight:600}
  .yes{color:var(--green);font-weight:800}.no{color:var(--red);font-weight:800}
  td.yes-c{background:var(--greenbg)}td.no-c{background:var(--redbg)}
  td.sch-c{background:var(--amberbg)}
  .chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;color:#fff;font-weight:700}
  .cA{background:var(--A)}.cB{background:var(--B)}.cC{background:var(--C)}.cD{background:var(--D)}.cE{background:var(--E)}
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  select,input[type=text]{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:14px}
  .muted{color:var(--mut);font-size:13px}
  .cpbtn{background:#e7ecf6;color:var(--blue);border:1px solid #cfd9ec;border-radius:8px;
         padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
  .cpbtn:hover{background:#d9e2f3}
  .gbtn{background:var(--blue);color:#fff;border:0;width:34px;height:34px;border-radius:8px;
        cursor:pointer;font-size:18px;font-weight:700;line-height:1}
  .gbtn.ghost{background:#e7ecf6;color:var(--blue)}
  .gantt-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;cursor:grab;user-select:none}
  .gantt-wrap.drag{cursor:grabbing}
  .gantt{position:relative;width:900px}
  .g-head{display:flex;border-bottom:1px solid var(--line);position:relative;height:32px}
  .g-row{display:flex;align-items:center;border-bottom:1px dashed #eef;height:48px;position:relative}
  .g-label{width:150px;flex-shrink:0;padding-left:14px;font-weight:600;font-size:14px;
           background:#fafbfe;height:100%;display:flex;align-items:center;border-right:1px solid var(--line);
           position:sticky;left:0;z-index:3}
  .g-track{position:relative;flex:1;height:100%}
  .g-month{position:absolute;top:0;font-size:12px;color:var(--mut);border-left:1px solid #eef;
           height:100%;padding-left:4px}
  .g-mark{position:absolute;top:13px;height:22px;border-radius:6px;color:#fff;font-size:11px;
          display:flex;align-items:center;justify-content:center;padding:0 6px;white-space:nowrap;
          transform:translateX(-2px);cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .g-mark:hover{outline:2px solid #111}
  .g-today{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:5}
  .g-today b{position:absolute;top:-2px;left:3px;color:var(--red);font-size:11px;font-weight:700;white-space:nowrap}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0;font-size:13px;align-items:center}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:13px;height:13px;border-radius:3px;display:inline-block}
  .loading{padding:60px;text-align:center;color:var(--mut)}
  .heat0{background:#f7f9fc;color:#c7cdd6}.heat1{background:#dbe6f7}.heat2{background:#b7cdf0}.heat3{background:#8fb1e8;color:#fff}
  .sess-head{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:6px}
  .sess-meta{font-size:14px;color:var(--mut);margin-bottom:12px}
  .ins{background:var(--E);color:#fff;border-radius:4px;padding:1px 6px;font-size:11px;margin-left:4px}
</style>
</head>
<body>
<header>
  <h1>急救課程儀表板</h1>
  <div class="sub"><span id="gen"></span></div>
</header>
<nav id="nav">
  <button data-t="ov" class="active">總覽</button>
  <button data-t="gantt">甘特圖</button>
  <button data-t="ses">課程資訊</button>
  <button data-t="fac">師資一覽</button>
  <button data-t="stu">學員課表</button>
  <button data-t="fb">課程回饋</button>
  <button data-t="all">12個月總表</button>
</nav>
<main>
  <div id="ov" class="tab active"><div class="loading">載入中…</div></div>
  <div id="gantt" class="tab"></div>
  <div id="ses" class="tab"></div>
  <div id="fac" class="tab"></div>
  <div id="stu" class="tab"></div>
  <div id="fb" class="tab"></div>
  <div id="all" class="tab"></div>
</main>

<script>
/* ★★★ 唯一要改的地方 ★★★  貼上 GAS 部署後的網址（結尾 /exec） */
const GAS_URL = "https://script.google.com/macros/s/AKfycby1m1Ygep8uZapOSr2vHCkIxaGzBGorUapDjHJcK3CNKXXaglwKtc1gktmREQGToxxx/exec";

let DATA=null, GZOOM=1;
const COPY=[];                       /* 複製文字暫存 */
const $=s=>document.querySelector(s);
const cls=b=>({A:'cA',B:'cB',C:'cC',D:'cD',E:'cE'}[b]||'');
const colorOf=b=>({A:'#4472C4',B:'#2e9e5b',C:'#d98800',D:'#9b59b6',E:'#17a2a2'}[b]||'#888');
const sBatches=()=>DATA.studentBatches||DATA.batches;
const esc=t=>String(t==null?'':t).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); $('#'+b.dataset.t).classList.add('active');
  if(b.dataset.t==='gantt') renderGantt();
});

function onData(d){
  DATA=d; $('#gen').textContent='更新於 '+(DATA.generatedAt||'');
  renderOverview(); renderSessions(); renderFaculty();
  renderStudents(); renderFeedback(); renderAll();
}
function showErr(msg){
  $('#ov').innerHTML='<div class="loading">讀取失敗：'+msg
    +'<br><br>請確認：①上方 GAS_URL 已貼正確網址（結尾 /exec）②GAS 部署權限設為「任何人」。</div>';
}
function load(){
  if(GAS_URL.indexOf('http')!==0){showErr('尚未填入 GAS_URL');return;}
  fetch(GAS_URL,{method:'GET'})
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(onData).catch(()=>jsonp());
}
function jsonp(){
  const cb='__cb'+Date.now();
  window[cb]=function(d){onData(d);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);};
  const s=document.createElement('script');
  s.src=GAS_URL+(GAS_URL.indexOf('?')>=0?'&':'?')+'callback='+cb;
  s.onerror=function(){showErr('無法連線至 GAS（網址或權限有誤）');};
  document.body.appendChild(s);
}
window.addEventListener('load',load);

/* ===== 場次反查 ===== */
function pickOf(st,course){
  const v=st.completion[course]; if(!v) return null;
  let m=String(v).match(/^([A-E])梯\s*場次(\d+)/);
  if(m) return {batch:m[1],no:parseInt(m[2],10)};
  m=String(v).match(/場次(\d+)/);
  if(m) return {batch:st.batch,no:parseInt(m[1],10)};
  return null;
}
function sessOf(st,course){
  const p=pickOf(st,course); if(!p) return null;
  return DATA.sessions.filter(s=>s.batch===p.batch&&s.course===course&&Number(s.no)===p.no)[0]||null;
}
function rosterOf(sess){
  const out=[];
  DATA.students.forEach(st=>{
    const p=pickOf(st,sess.course);
    if(p&&p.batch===sess.batch&&p.no===Number(sess.no)) out.push(st);
  });
  return out;
}
/* 三態：none 未排定 / sched 已排定(未來) / done 已完成(日期已過) */
function statOf(st,course){
  const s=sessOf(st,course);
  if(!s) return {k:st.completion[course]?'sched':'none',d:'',s:null};
  if(!s.date) return {k:'sched',d:'',s:s};
  return {k:(s.date<=DATA.today?'done':'sched'),d:s.date,s:s};
}
function isDone(st,course){return statOf(st,course).k==='done';}

/* ===== 複製 ===== */
function copyIdx(i,btn){
  const t=COPY[i]||'';
  const fin=()=>{const o=btn.textContent;btn.textContent='✔ 已複製';
    setTimeout(()=>btn.textContent=o,1400);};
  const fb=()=>{const ta=document.createElement('textarea');ta.value=t;
    ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);
    ta.select();try{document.execCommand('copy');fin();}catch(e){alert('複製失敗，請手動選取');}
    document.body.removeChild(ta);};
  if(navigator.clipboard&&window.isSecureContext)
    navigator.clipboard.writeText(t).then(fin).catch(fb);
  else fb();
}
document.addEventListener('click',e=>{
  const b=e.target.closest('.cpbtn'); if(!b)return;
  copyIdx(Number(b.dataset.ci),b);
});
function copyBtn(label,text){
  COPY.push(text);
  return `<button class="cpbtn" data-ci="${COPY.length-1}">${label}</button>`;
}

/* ===== 總覽 ===== */
function renderOverview(){
  const S=DATA.students, sess=DATA.sessions;
  const totalPairs=S.length*DATA.courses.length||1;
  let donePairs=0,schedPairs=0;
  S.forEach(s=>DATA.courses.forEach(c=>{const k=statOf(s,c).k;
    if(k==='done')donePairs++; else if(k==='sched')schedPairs++;}));
  const avg=Math.round(donePairs/totalPairs*100);
  const doneSess=sess.filter(x=>x.date&&x.date<=DATA.today).length;
  const cards=[['學員總數',S.length],['已排課場次',sess.length],
    ['已完成場次',doneSess+'<small> / '+sess.length+'</small>'],
    ['整體完課率',avg+'<small>%</small>'],
    ['已排定未上課',schedPairs+'<small> 人次</small>']];
  let h='<div class="cards">'+cards.map(c=>
    `<div class="card"><div class="k">${c[0]}</div><div class="v">${c[1]}</div></div>`).join('')+'</div>';
  h+='<div class="panel"><h2>各課程 完成率</h2>';
  DATA.courses.forEach(c=>{
    const d=S.filter(s=>isDone(s,c)).length, tot=S.length||1;
    const pct=Math.round(d/tot*100);
    const ns=sess.filter(x=>x.course===c).length;
    h+=`<div class="prow"><div class="name">${c}</div><div class="meta">${ns} 場次</div>
        <div class="bar"><span style="width:${pct}%"></span><em>${d}/${tot} · ${pct}%</em></div></div>`;
  });
  h+='</div><div class="panel"><h2>各梯 平均完課率</h2>';
  sBatches().forEach(b=>{
    const grp=S.filter(s=>s.batch===b); if(!grp.length)return;
    let dp=0; grp.forEach(s=>DATA.courses.forEach(c=>{if(isDone(s,c))dp++;}));
    const pct=Math.round(dp/(grp.length*DATA.courses.length)*100);
    h+=`<div class="prow"><div class="name"><span class="chip ${cls(b)}">${b==='E'?'E梯(其他月)':b+'梯'}</span></div>
        <div class="meta">${grp.length} 人</div>
        <div class="bar"><span style="width:${pct}%"></span><em>${pct}%</em></div></div>`;
  });
  h+='</div>'; $('#ov').innerHTML=h;
}

/* ===== 甘特圖（可縮放/拖曳，點標記看名單） ===== */
function renderGantt(){
  const el=$('#gantt');
  const sess=DATA.sessions.filter(s=>s.date);
  if(!sess.length){el.innerHTML='<div class="panel">尚無含日期的排課資料，請先在『課程場次』填入日期。</div>';return;}
  const dates=sess.map(s=>new Date(s.date));
  let min=new Date(Math.min(...dates)),max=new Date(Math.max(...dates)),today=new Date(DATA.today);
  min=new Date(min.getFullYear(),min.getMonth(),1);
  max=new Date(max.getFullYear(),max.getMonth()+1,0);
  if(today<min)min=new Date(today.getFullYear(),today.getMonth(),1);
  if(today>max)max=new Date(today.getFullYear(),today.getMonth()+1,0);
  const span=(max-min)/86400000||1;
  const pos=d=>((new Date(d)-min)/86400000)/span*100;
  let months=[],cur=new Date(min);
  while(cur<=max){months.push(new Date(cur));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}
  let head='<div class="g-head"><div class="g-label" style="background:#f0f3fa">課程 \\ 月份</div><div class="g-track">';
  months.forEach(m=>{head+=`<div class="g-month" style="left:${pos(m)}%">${m.getFullYear()}/${String(m.getMonth()+1).padStart(2,'0')}</div>`;});
  head+='</div></div>';
  let rows='';
  DATA.courses.forEach(c=>{
    let marks='';
    sess.filter(s=>s.course===c).forEach(s=>{
      const t=[s.teacher,s.teacher2].filter(Boolean).join(' / ');
      const cfm=s.confirmed?('已確認'+(s.confirmTime?' '+s.confirmTime:'')):'未確認';
      const n=rosterOf(s).length;
      marks+=`<div class="g-mark" data-k="${esc(s.batch+'|'+s.course+'|'+s.no)}"
        style="left:${pos(s.date)}%;background:${colorOf(s.batch)}"
        title="${esc(s.batch+'梯 場次'+(s.no||'')+'｜'+s.date+' '+(s.time||'')+'｜'+(s.place||'')+'｜'+t+'｜'+cfm+'｜報名 '+n+' 人（點擊看名單）')}">${s.batch}${s.no||''}·${n}人</div>`;
    });
    rows+=`<div class="g-row"><div class="g-label">${c}</div><div class="g-track">${marks}
           <div class="g-today" style="left:${pos(DATA.today)}%"><b>今日</b></div></div></div>`;
  });
  const legend='<div class="legend">'+DATA.batches.map(b=>
    `<span><i class="dot" style="background:${colorOf(b)}"></i>${b}梯</span>`).join('')+
    '<span><i class="dot" style="background:var(--red)"></i>今日紅線</span></div>';
  el.innerHTML=`<div class="panel"><h2>課程甘特圖（依實際日期）</h2>
    <div class="controls">
      <button class="gbtn" id="gzin">＋</button>
      <button class="gbtn" id="gzout">－</button>
      <button class="gbtn ghost" id="gzrst">⟳</button>
      <span class="muted">放大／縮小，按住可左右拖曳；標記顯示「梯次場次·人數」，<b>點擊標記可展開學員名單</b></span></div>
    ${legend}
    <div class="gantt-wrap" id="gwrap"><div class="gantt" id="ginner">${head}${rows}</div></div></div>
    <div id="gdetail"></div>`;
  applyZoom();
  $('#gzin').onclick=()=>{GZOOM=Math.min(6,GZOOM+0.5);applyZoom();};
  $('#gzout').onclick=()=>{GZOOM=Math.max(1,GZOOM-0.5);applyZoom();};
  $('#gzrst').onclick=()=>{GZOOM=1;applyZoom();$('#gwrap').scrollLeft=0;};
  enableDrag($('#gwrap'));
  el.querySelectorAll('.g-mark').forEach(m=>m.addEventListener('click',ev=>{
    ev.stopPropagation();
    const k=m.dataset.k.split('|');
    const s=DATA.sessions.filter(x=>x.batch===k[0]&&x.course===k[1]&&String(x.no)===k[2])[0];
    if(s){$('#gdetail').innerHTML=sessionCard(s,true);
      $('#gdetail').scrollIntoView({behavior:'smooth',block:'nearest'});}
  }));
}
function applyZoom(){const g=$('#ginner');if(g)g.style.width=(900*GZOOM)+'px';}
function enableDrag(w){
  let down=false,sx=0,sl=0,moved=false;
  w.addEventListener('mousedown',e=>{down=true;moved=false;w.classList.add('drag');sx=e.pageX;sl=w.scrollLeft;});
  window.addEventListener('mouseup',()=>{down=false;w.classList.remove('drag');});
  w.addEventListener('mousemove',e=>{if(!down)return;moved=true;e.preventDefault();w.scrollLeft=sl-(e.pageX-sx);});
}

/* ===== 場次卡片（含名單與複製鈕） ===== */
function sessionCard(s,highlight){
  const list=rosterOf(s);
  const t=[s.teacher,s.teacher2].filter(Boolean).join(' / ')||'—';
  const cfm=s.confirmed?`<span class="yes">已確認${s.confirmTime?'（'+s.confirmTime+'）':''}</span>`
                       :'<span class="no">未確認</span>';
  const names=list.map(x=>x.name).join('、');
  const phones=list.map(x=>x.phone).filter(Boolean).join('、');
  const both=list.map(x=>x.name+' '+(x.phone||'')).join('\n');
  let rows='';
  list.forEach((x,i)=>{
    rows+=`<tr><td>${i+1}</td><td class="name">${esc(x.name)}${x.batch!==s.batch?'<span class="ins">'+esc(x.batch)+' 插班</span>':''}</td>
      <td>${esc(x.phone||'')}</td><td><span class="chip ${cls(x.batch)}">${esc(x.batch||'?')}</span></td></tr>`;
  });
  return `<div class="panel" ${highlight?'style="border:2px solid '+colorOf(s.batch)+'"':''}>
    <div class="sess-head">
      <h2 style="margin:0">${esc(s.course)}</h2>
      <span class="chip ${cls(s.batch)}">${esc(s.batch)}梯</span>
      <span class="muted">場次 ${esc(s.no||'')}</span></div>
    <div class="sess-meta">📅 ${esc(s.date||'未定')} ${esc(s.time||'')}　📍 ${esc(s.place||'未定')}　
      👨‍🏫 ${esc(t)}　${cfm}</div>
    <div class="controls">
      <b>報名 ${list.length} 人</b>
      ${list.length?copyBtn('複製姓名',names)+copyBtn('複製分機',phones)+copyBtn('複製姓名+分機',both):''}
    </div>
    ${list.length?`<table><thead><tr><th style="width:50px">序</th><th>姓名</th><th>分機</th><th>所屬梯次</th></tr></thead>
      <tbody>${rows}</tbody></table>`:'<div class="muted">尚無學員選擇此場次。</div>'}
  </div>`;
}

/* ===== 課程資訊 ===== */
function renderSessions(){
  const co=['<option value="">全部課程</option>'].concat(DATA.courses.map(c=>`<option>${c}</option>`)).join('');
  const bo=['<option value="">全部梯次</option>'].concat(DATA.batches.map(b=>`<option>${b}</option>`)).join('');
  $('#ses').innerHTML=`<div class="panel"><h2>課程資訊與上課名單</h2>
    <div class="controls"><select id="seC">${co}</select><select id="seB">${bo}</select>
      <select id="seS"><option value="">全部狀態</option><option value="future">尚未上課</option>
      <option value="past">已上課</option></select>
      <span class="muted" id="seCount"></span></div>
    <div class="muted">每個場次可一鍵複製姓名／分機，方便貼到通訊軟體或簽到表。</div></div>
    <div id="seBody"></div>`;
  ['seC','seB','seS'].forEach(i=>$('#'+i).onchange=drawSessions);
  drawSessions();
}
function drawSessions(){
  const fc=$('#seC').value,fb=$('#seB').value,fs=$('#seS').value;
  let list=DATA.sessions.filter(s=>s.course);
  if(fc)list=list.filter(s=>s.course===fc);
  if(fb)list=list.filter(s=>s.batch===fb);
  if(fs)list=list.filter(s=>s.date&&(fs==='future'?s.date>DATA.today:s.date<=DATA.today));
  list=list.slice().sort((a,b)=>{
    const c=DATA.courses.indexOf(a.course)-DATA.courses.indexOf(b.course); if(c)return c;
    if(a.batch!==b.batch)return a.batch<b.batch?-1:1;
    return (Number(a.no)||0)-(Number(b.no)||0);});
  $('#seBody').innerHTML=list.length?list.map(s=>sessionCard(s,false)).join('')
    :'<div class="panel"><div class="muted">沒有符合條件的場次。</div></div>';
  $('#seCount').textContent='共 '+list.length+' 場次';
}

/* ===== 師資一覽 ===== */
function renderFaculty(){
  let h='<div class="panel"><h2>師資一覽（含排課場次統計）</h2><table><thead><tr>'
    +'<th>姓名</th><th>科別</th><th>職稱</th><th>負責課程</th><th>分機</th>'
    +'<th>排課場次</th><th>已確認</th><th>最近確認時間</th><th>累計人數</th><th>備註</th></tr></thead><tbody>';
  DATA.faculty.forEach(f=>{
    const mine=DATA.sessions.filter(s=>
      (s.teacher&&s.teacher.indexOf(f.name)>=0)||(s.teacher2&&s.teacher2.indexOf(f.name)>=0));
    const ok=mine.filter(s=>s.confirmed);
    const times=ok.map(s=>s.confirmTime).filter(Boolean).sort();
    const last=times.length?times[times.length-1]:'';
    const ppl=mine.reduce((a,s)=>a+rosterOf(s).length,0);
    const cfmTxt=mine.length?`<span class="${ok.length===mine.length?'yes':'no'}">${ok.length}/${mine.length}</span>`:'';
    h+=`<tr><td class="name">${esc(f.name)}</td><td>${esc(f.dept)}</td><td>${esc(f.title)}</td>
        <td style="text-align:left">${esc(f.courses)}</td><td>${esc(f.phone)}</td>
        <td><b>${mine.length}</b></td><td>${cfmTxt}</td><td>${last}</td>
        <td>${ppl||''}</td><td style="text-align:left">${esc(f.note)}</td></tr>`;
  });
  h+='</tbody></table></div>';
  const ss=DATA.sessions.filter(s=>s.course);
  if(ss.length){
    const un=ss.filter(s=>!s.confirmed).length;
    h+=`<div class="panel"><h2>場次教師確認明細　
      <span class="muted" style="font-size:14px;font-weight:400">未確認 ${un} / 共 ${ss.length} 場</span></h2>
      <table><thead><tr><th>梯次</th><th>課程</th><th>場次</th><th>日期</th><th>時間</th>
      <th>負責教師</th><th>確認狀態</th><th>確認時間</th></tr></thead><tbody>`;
    ss.forEach(s=>{
      const t=[s.teacher,s.teacher2].filter(Boolean).join(' / ');
      h+=`<tr><td><span class="chip ${cls(s.batch)}">${esc(s.batch)}</span></td>
        <td class="name">${esc(s.course)}</td><td>${esc(s.no||'')}</td><td>${esc(s.date||'')}</td><td>${esc(s.time||'')}</td>
        <td>${esc(t)}</td>
        <td class="${s.confirmed?'yes-c':'no-c'}">${s.confirmed?'<span class="yes">已確認</span>':'<span class="no">未確認</span>'}</td>
        <td>${esc(s.confirmTime||'')}</td></tr>`;
    });
    h+='</tbody></table></div>';
  }
  $('#fac').innerHTML=h;
}

/* ===== 學員課表（含上課日期） ===== */
function renderStudents(){
  const opts=['<option value="">全部課程</option>'].concat(DATA.courses.map(c=>`<option>${c}</option>`)).join('');
  $('#stu').innerHTML=`<div class="panel"><h2>學員課表（含上課日期）</h2>
    <div class="legend">
      <span><i class="dot" style="background:var(--greenbg);border:1px solid #bbb"></i>已完成(日期已過)</span>
      <span><i class="dot" style="background:var(--amberbg);border:1px solid #bbb"></i>已排定(尚未上課)</span>
      <span><i class="dot" style="background:var(--redbg);border:1px solid #bbb"></i>未排定</span></div>
    <div class="controls">
      <input id="sSearch" type="text" placeholder="搜尋姓名/員編…">
      <select id="sBatch"><option value="">全部梯次</option>${sBatches().map(b=>`<option>${b}</option>`).join('')}</select>
      <select id="sCourse">${opts}</select>
      <select id="sStatus"><option value="">全部狀態</option><option value="done">已完成</option>
        <option value="sched">已排定未上</option><option value="none">未排定</option></select>
      <span class="muted" id="sCount"></span></div><div id="sTable"></div></div>`;
  ['sSearch','sBatch','sCourse','sStatus'].forEach(id=>$('#'+id).oninput=drawStuTable);
  drawStuTable();
}
function cellOf(st,c){
  const r=statOf(st,c);
  if(r.k==='none')return '<td class="no-c"><span class="no">—</span></td>';
  const label=r.d||'已排定';
  const cls2=r.k==='done'?'yes-c':'sch-c';
  const mark=r.k==='done'?'✔ ':'🕐 ';
  const tip=r.s?esc(r.s.batch+'梯 場次'+(r.s.no||'')+' '+(r.s.time||'')+' '+(r.s.place||'')):'';
  return `<td class="${cls2}" title="${tip}">${mark}${esc(label)}</td>`;
}
function drawStuTable(){
  const kw=$('#sSearch').value.trim(),fb=$('#sBatch').value,fc=$('#sCourse').value,fs=$('#sStatus').value;
  let list=DATA.students.slice();
  if(kw)list=list.filter(s=>(s.name+s.id).indexOf(kw)>=0);
  if(fb)list=list.filter(s=>s.batch===fb);
  if(fc&&fs)list=list.filter(s=>statOf(s,fc).k===fs);
  let h='<table><thead><tr><th>員編</th><th>姓名</th><th>梯次</th><th>分機</th>'
    +DATA.courses.map(c=>`<th>${c}</th>`).join('')+'<th>完成</th></tr></thead><tbody>';
  list.forEach(s=>{
    let dc=0;
    const tds=DATA.courses.map(c=>{if(isDone(s,c))dc++;return cellOf(s,c);}).join('');
    h+=`<tr><td>${esc(s.id)}</td><td class="name">${esc(s.name)}</td>
        <td><span class="chip ${cls(s.batch)}">${esc(s.batch||'?')}</span></td><td>${esc(s.phone||'')}</td>${tds}
        <td><b>${dc}/${DATA.courses.length}</b></td></tr>`;
  });
  h+='</tbody></table>'; $('#sTable').innerHTML=h; $('#sCount').textContent='共 '+list.length+' 人';
}

/* ===== 課程回饋（純文字） ===== */
function renderFeedback(){
  const opts=['<option value="">全部課程</option>'].concat(DATA.courses.map(c=>`<option>${c}</option>`)).join('');
  $('#fb').innerHTML=`<div class="panel"><h2>課程回饋（學員回饋）</h2>
    <div class="controls"><select id="fbCourse">${opts}</select>
      <span class="muted" id="fbCount"></span></div></div><div id="fbBody"></div>`;
  $('#fbCourse').onchange=drawFeedback;
  drawFeedback();
}
function drawFeedback(){
  const fc=($('#fbCourse')||{}).value||'';
  const courses=fc?[fc]:DATA.courses;
  let h='',total=0;
  courses.forEach(c=>{
    const rows=(DATA.feedback||[]).filter(f=>f.course===c);
    if(!rows.length)return; total+=rows.length;
    let items='';
    rows.forEach(r=>{
      let lines='';
      r.texts.forEach(t=>{lines+=`<div style="margin:2px 0">${t.label?'<span class="muted">'+esc(t.label)+'：</span>':''}${esc(t.val)}</div>`;});
      const meta=[r.batch?r.batch+'梯':'',r.student,r.date].filter(Boolean).join('・');
      items+=`<div style="padding:10px 12px;border-left:3px solid var(--blue2);background:#f7f9fc;margin:8px 0;border-radius:4px">
        ${lines}${meta?'<div class="muted" style="margin-top:4px">— '+esc(meta)+'</div>':''}</div>`;
    });
    h+=`<div class="panel"><h2>${c}　<span class="muted" style="font-size:14px;font-weight:400">${rows.length} 則回饋</span></h2>${items}</div>`;
  });
  if(!h)h='<div class="panel"><div class="muted">目前沒有回饋資料。請在試算表「課程回饋」分頁填入。</div></div>';
  $('#fbBody').innerHTML=h;
  const cnt=$('#fbCount'); if(cnt)cnt.textContent='共 '+total+' 則回饋';
}

/* ===== 12個月總表 + checklist ===== */
function renderAll(){
  const sess=DATA.sessions.filter(s=>s.date);
  const months=[...new Set(sess.map(s=>s.date.slice(0,7)))].sort();
  let heat;
  if(months.length){
    heat='<div class="panel"><h2>12 個月排課總表（各月場次數）</h2><table><thead><tr><th>課程 \\ 月份</th>'
      +months.map(m=>`<th>${m}</th>`).join('')+'<th>合計</th></tr></thead><tbody>';
    DATA.courses.forEach(c=>{
      let tot=0;
      const cells=months.map(m=>{const n=sess.filter(s=>s.course===c&&s.date.slice(0,7)===m).length;tot+=n;
        const hc=n===0?'heat0':n===1?'heat1':n===2?'heat2':'heat3';return `<td class="${hc}">${n||''}</td>`;}).join('');
      heat+=`<tr><td class="name">${c}</td>${cells}<td><b>${tot}</b></td></tr>`;
    });
    heat+='</tbody></table></div>';
  }else heat='<div class="panel"><h2>12 個月排課總表</h2><div class="muted">尚無含日期的排課。</div></div>';

  let list='<div class="panel"><h2>全學員完課 Checklist（含上課日期）</h2>'
    +'<div class="legend"><span><i class="dot" style="background:var(--greenbg);border:1px solid #bbb"></i>已完成</span>'
    +'<span><i class="dot" style="background:var(--amberbg);border:1px solid #bbb"></i>已排定</span>'
    +'<span><i class="dot" style="background:var(--redbg);border:1px solid #bbb"></i>未排定</span></div>'
    +'<table><thead><tr><th>員編</th><th>姓名</th><th>梯次</th>'
    +DATA.courses.map(c=>`<th>${c}</th>`).join('')+'<th>完成</th><th style="text-align:left">尚未完成課程</th></tr></thead><tbody>';
  DATA.students.forEach(s=>{
    let dc=0,miss=[];
    const tds=DATA.courses.map(c=>{if(isDone(s,c))dc++;else miss.push(c);return cellOf(s,c);}).join('');
    list+=`<tr><td>${esc(s.id)}</td><td class="name">${esc(s.name)}</td>
      <td><span class="chip ${cls(s.batch)}">${esc(s.batch||'?')}</span></td>${tds}
      <td><b>${dc}/${DATA.courses.length}</b></td>
      <td style="text-align:left;color:${miss.length?'var(--red)':'var(--green)'}">${miss.length?miss.join('、'):'全部完成 ✔'}</td></tr>`;
  });
  list+='</tbody></table></div>';
  $('#all').innerHTML=heat+list;
}
</script>
</body>
</html>
